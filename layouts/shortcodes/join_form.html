{{ $turnstileSiteKey := getenv "HUGO_TURNSTILE_SITE_KEY" }}
<form class="join-form" method="post" action="/api/join">
  <p class="form-note">Your details will only be used to respond to your enquiry.</p>
  <label>
    <span>Name</span>
    <input type="text" name="name" autocomplete="name" required>
  </label>
  <label>
    <span>Email</span>
    <input type="email" name="email" autocomplete="email" required>
  </label>
  <label>
    <span>Phone</span>
    <input type="tel" name="phone" autocomplete="tel" required>
  </label>
  <label>
    <span>Reason / questions</span>
    <textarea name="message" rows="6" required></textarea>
  </label>
  <label class="form-consent">
    <input type="checkbox" name="consent" value="yes" required>
    <span>I understand my details will only be used to respond to this enquiry.</span>
  </label>
  {{ if $turnstileSiteKey }}
    <div class="cf-turnstile" data-sitekey="{{ $turnstileSiteKey }}"></div>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  {{ else }}
    <p class="form-note">Turnstile is not configured yet. Set `HUGO_TURNSTILE_SITE_KEY` in the build environment.</p>
  {{ end }}
  <button type="submit">Send enquiry</button>
</form>
