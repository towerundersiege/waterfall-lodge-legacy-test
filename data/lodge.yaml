charity:
  current_year: 2026
  featured:
    - title: Teddies for Loving Care Surrey
      link: https://tlcappealsurrey.org.uk/
      logo: https://tlcappealsurrey.org.uk/wp-content/uploads/2021/12/Teddies-For-Loving-Care-Surrey-TLC.png
      summary: Teddy bears are given to children in A&E to calm, comfort and distract them during treatment.
    - title: Surrey 2030 Festival
      link: https://surreyfestival.org.uk/
      logo: https://sp-ao.shortpixel.ai/client/to_webp,q_lossless,ret_img,w_300,h_68/https://surreyfestival.org.uk/wp-content/uploads/2024/09/Surrey-Festival-2.png
      summary: Surrey-wide giving in support of the Masonic Charitable Foundation and local Surrey charities.
    - title: Masonic Charitable Foundation
      link: https://mcf.org.uk/
      logo: https://sp-ao.shortpixel.ai/client/to_webp,q_lossless,ret_img,w_600/https://surreyfestival.org.uk/wp-content/uploads/2024/09/MCF_Logo_RGB_AW.png
      summary: The MCF supports Freemasons, their families and wider community charities through grants and relief.
  supported:
    - title: Teddies for Loving Care Surrey
      link: https://tlcappealsurrey.org.uk/
      summary: Teddy bears for children arriving at A&E, where the bears help calm, comfort and distract them during treatment.
      support: Local fundraising, lodge collections and patron support.
      impact: Surrey TLC supports 10 Surrey hospitals and distributes about 1,100 bears each month.
    - title: Surrey 2030 Festival
      link: https://surreyfestival.org.uk/
      summary: Surrey-wide charitable giving in support of the Masonic Charitable Foundation, with local impact across the county.
      support: Lodge giving and wider Surrey participation.
      impact: Surrey charities supported through MCF grants and match-funding include LinkAble, the Orpheus Centre Trust, Momentum, Crossroads Care Surrey, Rainbow Trust, Wildlife Aid Foundation and Your Sanctuary.
    - title: Air Ambulance Charity Kent Surrey Sussex
      link: https://aakss.org.uk/
      summary: Emergency medical response across Kent, Surrey and Sussex.
      support: Lodge donations and community fundraising.
      impact: The charity responds 24/7, 365 days a year and helps bring specialist treatment to the scene when seconds matter.
    - title: Woking & Sam Beare Hospice
      link: https://wsbh.org.uk/
      summary: Specialist palliative and end-of-life care for Surrey families.
      support: Lodge donations and local charity support.
      impact: Care is delivered without charge across the community, in patients' homes, in the hospice and through wellbeing services.
    - title: Cancer Research UK
      link: https://www.cancerresearchuk.org/
      summary: One of the UK's leading cancer charities, funding research into all cancer types.
      support: Annual lodge giving and wider fundraising.
      impact: The charity's work has helped drive major advances in prevention, diagnosis and treatment.
  archive:
    title: Recent lodge giving
    intro: These are examples of the lodge's recorded charitable gifts from the legacy page archive.
    items:
      - year: "Legacy record"
        entries:
          - name: Cancer Research
            amount: "£150.00"
            note: Annual lodge donation.
          - name: Surrey Air Ambulance
            amount: "£150.00"
            note: Local emergency care support.
          - name: Woking Sam Beare Hospice
            amount: "£150.00"
            note: Local hospice care support.
          - name: Lodge Widows Christmas Grant
            amount: "£50.00 each"
            note: Annual Christmas grant to lodge widows.
